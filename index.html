<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background: linear-gradient(to bottom, #eef2f7, #dfe8f5);
        }

        .contenedor{
            text-align:center;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 4px 15px rgba(0,0,0,0.15);
        }

        .icono{
            width:110px;
            height:110px;
            background-color:#54779c;
            border:4px solid white;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:auto;
            font-size:65px;
            color:white;
            box-shadow:0px 4px 15px rgba(0,0,0,0.25);
        }

        h2{
            margin-top:18px;
            margin-bottom:25px;
            color:#1f3c5a;
        }

        input{
            width:300px;
            padding:14px;
            margin:10px 0;
            border:2px solid #b8c8dd;
            border-radius:12px;
            outline:none;
            font-size:15px;
            background-color:white;
        }

        input:focus{
            border-color:#54779c;
        }

        .boton{
            width:300px;
            padding:14px;
            margin-top:15px;
            border:none;
            border-radius:12px;
            background-color:#54779c;
            color:white;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
            transition:0.3s;
        }

        .boton:hover{
            background-color:#1f3c5a;
        }

    </style>

</head>

<body>

    <div class="contenedor">

        <div class="icono">
            👤
        </div>

        <h2>Inicio de sesión</h2>

        <input type="text" id="usuario" placeholder="Nombre de usuario">

        <br>

        <input type="password" id="contrasena" placeholder="Contraseña">

        <br>

        <button class="boton" onclick="iniciarSesion()">
            Iniciar sesión
        </button>

    </div>

<script>

function iniciarSesion(){

    let usuario = document.getElementById("usuario").value;
    let contrasena = document.getElementById("contrasena").value;

    // Dueño de la cadena
    if(usuario=="admin" && contrasena=="12345"){

        localStorage.setItem("tipoUsuario","admin");
        window.location.href="resumen.html";

    }

    // Dueños de sucursales
    else if(
        (usuario=="sucursal1" ||
         usuario=="sucursal2" ||
         usuario=="sucursal3" ||
         usuario=="sucursal4" ||
         usuario=="sucursal5")
         && contrasena=="12345"
    ){

        localStorage.setItem("tipoUsuario","sucursal");
        window.location.href="resumen.html";

    }

    else{

        alert("Usuario o contraseña incorrectos");

    }

}

</script>

</body>

</html>
