<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear cuenta</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background-color:#eef2f7;
}

/* BARRA SUPERIOR */

.topbar{
    background-color:#1f3c5a;
    color:white;
    padding:15px;
    display:flex;
    align-items:center;
}

.menu{
    font-size:24px;
    cursor:pointer;
    display:flex;
    align-items:center;
}

.titulo-barra{
    margin-left:20px;
    color:white;
    font-size:24px;
    font-weight:bold;
    display:flex;
    align-items:center;
}

/* MENÚ LATERAL */

.sidebar{
    position:fixed;
    top:0;
    left:-250px;
    width:250px;
    height:100%;
    background-color:#1f3c5a;
    transition:0.3s;
    z-index:1000;
    padding-top:20px;
}

.sidebar.active{
    left:0;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px 20px;
}

.sidebar a:hover{
    background-color:#2d547c;
}

.icono{
    display:inline-flex;
    justify-content:center;
    align-items:center;
    width:35px;
    height:35px;
    border-radius:50%;
    background:#54779c;
    margin-right:10px;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
}

.overlay.active{
    display:block;
}

/* FORMULARIO */

.contenedor{
    max-width:450px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.15);
    text-align:center;
}

h2{
    color:#1f3c5a;
    margin-bottom:20px;
}

input,
select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:2px solid #b8c8dd;
    border-radius:12px;
    font-size:15px;
}

input:focus,
select:focus{
    border-color:#54779c;
    outline:none;
}

.boton{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background-color:#54779c;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.boton:hover{
    background-color:#1f3c5a;
}

</style>
</head>

<body>

<!-- MENÚ -->

<div class="sidebar" id="sidebar">

<a href="resumen.html">
<span class="icono">📊</span> Resumen
</a>

<a href="buscar.html">
<span class="icono">🔍</span> Buscar
</a>

<div style="height:450px;"></div>

<a href="crearcuenta.html">
<span class="icono">➕</span> Crear cuenta
</a>

<a href="eliminar.html">
<span class="icono">🗑️</span> Eliminar cuenta
</a>

<a href="index.html">
<span class="icono">🚪</span> Cerrar sesión
</a>

</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="topbar">

    <span class="menu" onclick="toggleMenu()">☰</span>

    <span class="titulo-barra">
        Cadena de Restaurantes - MIS
    </span>

</div>

<!-- FORMULARIO -->

<div class="contenedor">

<h2>Creación de cuenta</h2>

<input type="text" placeholder="Nombre completo">

<input type="text" placeholder="Nombre de usuario">

<input type="password" placeholder="Contraseña">

<input type="text" placeholder="Cédula de identidad">

<input type="text" placeholder="Dirección">

<input type="text" placeholder="Número de celular">

<select>
    <option>Seleccione sucursal</option>
    <option>Sucursal 1</option>
    <option>Sucursal 2</option>
    <option>Sucursal 3</option>
    <option>Sucursal 4</option>
    <option>Sucursal 5</option>
</select>

<a href="resumen.html">
<button class="boton">
Crear cuenta
</button>
</a>

</div>

<script>

function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

</script>

</body>
</html>
